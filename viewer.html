<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asset Viewer — floor-is-lava</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #1a1a1a; font-family: monospace; color: #fff; }
      #controls {
        position: fixed; top: 16px; left: 16px; z-index: 10;
        display: flex; gap: 8px; align-items: center;
      }
      select, button {
        background: rgba(255,255,255,0.12);
        border: 1px solid rgba(255,255,255,0.25);
        border-radius: 6px; color: #fff;
        font-family: monospace; font-size: 14px;
        padding: 6px 12px; cursor: pointer;
        backdrop-filter: blur(4px);
      }
      select option {
        background: #2a2a2a; color: #fff;
      }
      select:hover, button:hover { background: rgba(255,255,255,0.2); }
      button.active { background: rgba(255,255,255,0.3); border-color: rgba(255,255,255,0.5); }
      #info {
        position: fixed; bottom: 16px; left: 16px; z-index: 10;
        font-size: 12px; color: rgba(255,255,255,0.5);
      }
    </style>
  </head>
  <body>
    <div id="controls">
      <select id="asset-picker"></select>
      <button id="wireframe-btn">Wireframe</button>
      <button id="hitbox-btn">Hitbox</button>
    </div>
    <div id="info">Orbit: drag · Zoom: scroll · Pan: right-drag</div>
    <script type="module" src="/src/viewer.js"></script>
  </body>
</html>
