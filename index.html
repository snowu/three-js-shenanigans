<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>floor-is-lava</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #000; touch-action: none; }
      @media (pointer: coarse) {
        #score-hud { font-size: 16px !important; top: 10px !important; right: 10px !important; }
        #score-hud div { font-size: 13px !important; }
      }
    </style>
  </head>
  <body>
    <div id="score-hud" style="
      position: fixed; top: 20px; right: 20px;
      font-family: monospace; font-size: 24px; color: #fff;
      text-align: right; pointer-events: none; user-select: none;
      text-shadow: 0 0 6px rgba(0,0,0,0.8);
    ">
      <div>Score: <span id="score-current">0</span></div>
      <div style="font-size: 20px; color: #aaa;">Best: <span id="score-best">0</span></div>
      <div style="font-size: 20px; color: #ff0; margin-top: 4px;">Time: <span id="timer">0:00</span></div>
      <div id="debug-hud" style="display: none;">
        <div style="font-size: 20px; color: #f80; margin-top: 8px;">Speed: <span id="speed-meter">0</span></div>
        <div style="font-size: 20px; color: #8cf; margin-top: 4px;">Jumps: <span id="air-jumps">0</span></div>
        <div style="font-size: 20px; color: #aaa; margin-top: 4px;">State: <span id="player-state">-</span></div>
      </div>
    </div>
    <div id="mobile-overlay" style="
      display: none;
      position: fixed; inset: 0;
      justify-content: center; align-items: center;
      font-family: monospace; color: #fff;
      text-shadow: 0 0 10px rgba(0,0,0,0.9);
      pointer-events: none; z-index: 50;
      flex-direction: column; gap: 12px;
    ">
      <div style="font-size: 28px;">Touch to run</div>
      <div style="font-size: 16px; color: #aaa;">Hold to run · Release to jump · Touch while airborne to kick</div>
    </div>
    <button id="cam-mode-btn" style="
      display: none;
      position: fixed; bottom: 16px; right: 16px;
      height: 36px; padding: 0 12px;
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px; color: #fff; font-family: monospace; font-size: 14px;
      cursor: pointer; z-index: 100;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    ">FP</button>
    <button id="fullscreen-btn" style="
      display: none;
      position: fixed; bottom: 16px; right: 70px;
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px; color: #fff; font-size: 20px;
      cursor: pointer; z-index: 100;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    " aria-label="Fullscreen">⛶</button>
    <script>
      window.DEV_MODE = location.hostname === 'localhost' || location.hostname === '';
      if (window.DEV_MODE) {
        document.getElementById('debug-hud').style.display = 'block';
        document.getElementById('cam-mode-btn').style.display = 'block';
      }

      if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
        document.getElementById('mobile-overlay').style.display = 'flex';
        var fsBtn = document.getElementById('fullscreen-btn');
        fsBtn.style.display = 'block';
        function updateFsBtn() {
          var isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
          fsBtn.textContent = isFs ? '✕' : '⛶';
          fsBtn.setAttribute('aria-label', isFs ? 'Exit fullscreen' : 'Fullscreen');
        }
        fsBtn.addEventListener('touchend', function(e) {
          e.stopPropagation();
          var isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
          if (isFs) {
            (document.exitFullscreen || document.webkitExitFullscreen).call(document);
          } else {
            var el = document.documentElement;
            var rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
            if (rfs) {
              rfs.call(el).then(function() {
                if (screen.orientation && screen.orientation.lock) {
                  screen.orientation.lock('landscape').catch(function() {});
                }
              }).catch(function() {});
            }
          }
        });
        document.addEventListener('fullscreenchange', updateFsBtn);
        document.addEventListener('webkitfullscreenchange', updateFsBtn);
      }
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
